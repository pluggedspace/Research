name: Compile All Whitepapers and Deploy Hub

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Future-proofs actions against Node 20 deprecations

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository source code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Set up Python environment correctly
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install MkDocs and full system LaTeX environments
      - name: Install Hub Dependencies
        run: |
          pip install mkdocs-material
          sudo apt-get update && sudo apt-get install -y pandoc texlive-latex-recommended texlive-xetex lmodern

      # 4. Download and configure the premium Eisvogel LaTeX template
      - name: Download Eisvogel Template
        run: |
          mkdir -p ~/.local/share/pandoc/templates
          wget https://github.com/Wandmalfarbe/pandoc-latex-template/releases/download/v2.4.2/Eisvogel-2.4.2.tar.gz
          tar -xvzf Eisvogel-2.4.2.tar.gz -C ~/.local/share/pandoc/templates/
          mv ~/.local/share/pandoc/templates/eisvogel.tex ~/.local/share/pandoc/templates/eisvogel.latex

      # 5. Dynamically find all index.md files in subfolders and compile them to PDFs
      - name: Compile All PDFs
        run: |
          find docs -name "index.md" ! -path "docs/index.md" | while read -r file; do
            dir=$(dirname "$file")
            paper_name=$(basename "$dir")
            echo "Compiling $file to $dir/$paper_name.pdf..."
            
            pandoc "$file" \
              -o "$dir/$paper_name.pdf" \
              --from markdown \
              --template eisvogel \
              --listings \
              --number-sections \
              --toc
          done

      # 6. Build the static website mapping
      - name: Build Static Website
        run: |
          mkdocs build

      # 7. Deploy the unified site and PDFs to GitHub Pages
      - name: Deploy Hub to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
