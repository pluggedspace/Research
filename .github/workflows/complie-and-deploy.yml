name: Compile All Whitepapers and Deploy Hub

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Hub Dependencies
        run: |
          pip install mkdocs-material
          sudo apt-get update && sudo apt-get install -y \
            pandoc \
            texlive-latex-recommended \
            texlive-xetex \
            lmodern \
            texlive-fonts-extra \
            texlive-latex-extra \
            fonts-font-awesome \
            texlive-lang-english

      # Dynamically download the latest Eisvogel template and copy the correct template file
      - name: Download Eisvogel Template
        run: |
          mkdir -p ~/.local/share/pandoc/templates
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/Wandmalfarbe/pandoc-latex-template/releases/latest | grep "browser_download_url.*\.tar\.gz" | head -n1 | cut -d '"' -f 4)
          echo "Downloading from: $DOWNLOAD_URL"
          wget "$DOWNLOAD_URL"
          
          # Create a secure temporary directory for extraction
          mkdir -p extracted_template
          tar -xzf Eisvogel-*.tar.gz -C extracted_template
          
          # Dynamic fallback check: handles legacy versions (eisvogel.tex) OR modern versions (template.tex)
          if [ -f extracted_template/template.tex ]; then
            cp extracted_template/template.tex ~/.local/share/pandoc/templates/eisvogel.latex
          elif [ -f extracted_template/eisvogel.tex ]; then
            cp extracted_template/eisvogel.tex ~/.local/share/pandoc/templates/eisvogel.latex
          else
            # Handles cases where files might extract inside an inner archive directory
            cp extracted_template/*/template.tex ~/.local/share/pandoc/templates/eisvogel.latex || cp extracted_template/*/eisvogel.tex ~/.local/share/pandoc/templates/eisvogel.latex
          fi
          
          # Cleanup environment workspace
          rm -rf extracted_template Eisvogel-*.tar.gz

      - name: Compile All PDFs
        run: |
          find docs -name "index.md" ! -path "docs/index.md" -print0 | while IFS= read -r -d '' file; do
            dir=$(dirname "$file")
            paper_name=$(basename "$dir")
            echo "Compiling $file to $dir/$paper_name.pdf..."
            pandoc "$file" \
              -o "$dir/$paper_name.pdf" \
              --from markdown \
              --template eisvogel \
              --pdf-engine=xelatex \
              --listings \
              --number-sections \
              --toc
          done

      - name: Build Static Website
        run: mkdocs build

      - name: Deploy Hub to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
