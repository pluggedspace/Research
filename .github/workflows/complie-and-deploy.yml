name: Compile All Whitepapers and Deploy Hub

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.x'

      # Install Python dependencies and Pandoc environment
      - name: Install Hub Dependencies
        run: |
          pip install mkdocs-material
          sudo apt-get update && sudo apt-get install -p -y pandoc texlive-latex-recommended texlive-xetex lmodern

      # Download Eisvogel template manually for native control in a custom loop
      - name: Download Eisvogel Template
        run: |
          mkdir -p ~/.local/share/pandoc/templates
          wget https://github.com/Wandmalfarbe/pandoc-latex-template/releases/download/v2.4.2/Eisvogel-2.4.2.tar.gz
          tar -xvzf Eisvogel-2.4.2.tar.gz -C ~/.local/share/pandoc/templates/
          mv ~/.local/share/pandoc/templates/eisvogel.tex ~/.local/share/pandoc/templates/eisvogel.latex

      # DYNAMIC STEP: Loops through every index.md in the docs subfolders
      # and compiles a corresponding PDF in that exact same folder.
      - name: Compile All PDFs
        run: |
          find docs -name "index.md" ! -path "docs/index.md" | while read -r file; do
            dir=$(dirname "$file")
            paper_name=$(basename "$dir")
            echo "Compiling $file to $dir/$paper_name.pdf..."
            
            pandoc "$file" \
              -o "$dir/$paper_name.pdf" \
              --from markdown \
              --template eisvogel \
              --listings \
              --number-sections \
              --toc
          done

      - name: Build Static Research Website
        run: |
          mkdocs build

      - name: Deploy Hub to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
