name: Compile All Whitepapers and Deploy Hub

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Prevents Node 20 runner deprecation warnings

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository source code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Set up Python environment correctly
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install MkDocs, system dependencies, and corporate-ready LaTeX font sets
      - name: Install Hub Dependencies
        run: |
          pip install mkdocs-material
          sudo apt-get update && sudo apt-get install -y \
            pandoc \
            texlive-latex-recommended \
            texlive-xetex \
            lmodern \
            texlive-fonts-extra \
            texlive-latex-extra \
            fonts-font-awesome \
            texlive-lang-english

      # 4. Download and configure the premium Eisvogel LaTeX template (corrected)
      - name: Download Eisvogel Template
        run: |
          mkdir -p ~/.local/share/pandoc/templates
          wget https://github.com/Wandmalfarbe/pandoc-latex-template/releases/download/v2.4.2/Eisvogel-2.4.2.tar.gz
          tar -xvzf Eisvogel-2.4.2.tar.gz
          cp eisvogel/eisvogel.tex ~/.local/share/pandoc/templates/eisvogel.latex
          rm -rf eisvogel Eisvogel-2.4.2.tar.gz

      # 5. Dynamically compile markdown files using modern XeLaTeX engine
      - name: Compile All PDFs
        run: |
          find docs -name "index.md" ! -path "docs/index.md" -print0 | while IFS= read -r -d '' file; do
            dir=$(dirname "$file")
            paper_name=$(basename "$dir")
            echo "Compiling $file to $dir/$paper_name.pdf..."
            pandoc "$file" \
              -o "$dir/$paper_name.pdf" \
              --from markdown \
              --template eisvogel \
              --pdf-engine=xelatex \
              --listings \
              --number-sections \
              --toc
          done

      # 6. Build the static website mapping
      - name: Build Static Website
        run: |
          mkdocs build

      # 7. Deploy the unified site and PDFs to GitHub Pages
      - name: Deploy Hub to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
